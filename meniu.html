<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mamma Mia Restaurant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:wght@300;400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5ECD7;
    --dark: #1A1208;
    --red: #C0392B;
    --gold: #C9A84C;
    --warm: #8B4513;
    --light-cream: #FBF6EE;
    --text-dark: #2C1810;
    --shadow: rgba(26,18,8,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Montserrat', sans-serif;
    background: var(--light-cream);
    color: var(--text-dark);
    overflow-x: hidden;
  }

  .lang-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 1000;
    background: var(--dark);
    display: flex;
    justify-content: flex-end;
    align-items: center;
    padding: 8px 32px;
    gap: 4px;
  }
  .lang-bar span {
    color: var(--gold);
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-right: 12px;
    font-family: 'Montserrat', sans-serif;
  }
  .lang-btn {
    background: transparent;
    border: 1px solid rgba(201,168,76,0.4);
    color: #fff;
    padding: 4px 14px;
    font-size: 11px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    cursor: pointer;
    font-family: 'Montserrat', sans-serif;
    transition: all 0.25s;
    border-radius: 2px;
  }
  .lang-btn:hover, .lang-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: var(--dark);
    font-weight: 600;
  }

  .hero {
    min-height: 100vh;
    background:
      linear-gradient(160deg, rgba(26,18,8,0.82) 0%, rgba(192,57,43,0.35) 60%, rgba(26,18,8,0.75) 100%),
      url('https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=1600&q=80') center/cover no-repeat;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 100px 24px 60px;
    position: relative;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23C9A84C' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    pointer-events: none;
  }
  .hero-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    padding: 6px 20px;
    margin-bottom: 28px;
    font-family: 'Montserrat', sans-serif;
    animation: fadeUp 0.8s ease both;
  }
  .hero h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(3rem, 9vw, 8rem);
    font-weight: 900;
    color: #fff;
    line-height: 0.95;
    letter-spacing: -2px;
    animation: fadeUp 0.9s ease 0.1s both;
    text-shadow: 0 4px 40px rgba(0,0,0,0.5);
  }
  .hero h1 em { display: block; font-style: italic; color: var(--gold); }
  .hero-sub {
    margin-top: 24px;
    color: rgba(255,255,255,0.75);
    font-size: 13px;
    letter-spacing: 3px;
    text-transform: uppercase;
    animation: fadeUp 1s ease 0.2s both;
  }
  .hero-cta {
    margin-top: 48px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    justify-content: center;
    animation: fadeUp 1s ease 0.35s both;
  }
  .btn-primary {
    background: var(--red);
    color: #fff;
    padding: 14px 36px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    font-family: 'Montserrat', sans-serif;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: all 0.3s;
    clip-path: polygon(8px 0%, 100% 0%, calc(100% - 8px) 100%, 0% 100%);
  }
  .btn-primary:hover { background: #a93226; transform: translateY(-2px); }
  .btn-outline {
    background: transparent;
    color: #fff;
    padding: 13px 36px;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    text-decoration: none;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    border: 1px solid rgba(255,255,255,0.5);
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .scroll-hint {
    position: absolute;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: rgba(255,255,255,0.5);
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    animation: bounce 2s infinite;
  }
  .scroll-hint::after {
    content: '';
    width: 1px;
    height: 40px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.5), transparent);
  }

  nav {
    position: sticky;
    top: 32px;
    z-index: 900;
    background: var(--dark);
    padding: 0 32px;
    overflow-x: auto;
    scrollbar-width: none;
    box-shadow: 0 4px 30px rgba(0,0,0,0.3);
  }
  nav::-webkit-scrollbar { display: none; }
  .nav-inner {
    display: flex;
    align-items: center;
    min-width: max-content;
    margin: 0 auto;
    justify-content: center;
  }
  .nav-item {
    color: rgba(255,255,255,0.65);
    text-decoration: none;
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    padding: 18px 16px;
    display: block;
    transition: all 0.2s;
    white-space: nowrap;
    border-bottom: 2px solid transparent;
  }
  .nav-item:hover, .nav-item.active {
    color: var(--gold);
    border-bottom-color: var(--gold);
  }

  .section-wrap {
    max-width: 1400px;
    margin: 0 auto;
    padding: 80px 32px;
  }
  .section-header { text-align: center; margin-bottom: 56px; }
  .section-eyebrow {
    display: inline-block;
    color: var(--gold);
    font-size: 10px;
    letter-spacing: 4px;
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 12px;
  }
  .section-title {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.1;
  }
  .section-title em { font-style: italic; color: var(--red); }
  .section-divider {
    width: 60px;
    height: 2px;
    background: linear-gradient(to right, var(--red), var(--gold));
    margin: 20px auto 0;
  }

  .menu-section { padding: 80px 0; }
  .menu-section:nth-child(even) { background: var(--light-cream); }
  .menu-section:nth-child(odd) { background: #fff; }

  .menu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 24px;
    margin-top: 40px;
  }
  .food-card {
    background: var(--light-cream);
    border: 1px solid rgba(201,168,76,0.2);
    padding: 28px 24px;
    position: relative;
    transition: all 0.35s cubic-bezier(0.4,0,0.2,1);
    overflow: hidden;
  }
  .food-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 3px;
    height: 0;
    background: linear-gradient(to bottom, var(--red), var(--gold));
    transition: height 0.35s ease;
  }
  .food-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px var(--shadow);
    border-color: rgba(201,168,76,0.5);
  }
  .food-card:hover::before { height: 100%; }
  .card-num {
    font-family: 'Playfair Display', serif;
    font-size: 3rem;
    font-weight: 900;
    color: rgba(201,168,76,0.12);
    position: absolute;
    top: 8px; right: 16px;
    line-height: 1;
    pointer-events: none;
  }
  .card-name {
    font-family: 'Playfair Display', serif;
    font-size: 1.15rem;
    font-weight: 600;
    color: var(--text-dark);
    line-height: 1.3;
    margin-bottom: 8px;
  }
  .card-tag {
    display: inline-block;
    font-size: 9px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--red);
    font-weight: 600;
    opacity: 0.7;
  }

  .gallery-section { background: var(--dark); padding: 80px 0; }
  .gallery-section .section-title { color: #fff; }
  .gallery-section .section-eyebrow { color: var(--gold); }
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    grid-template-rows: 220px 220px;
    gap: 8px;
    margin-top: 40px;
  }
  .gallery-item { overflow: hidden; position: relative; cursor: pointer; }
  .gallery-item:first-child { grid-column: span 2; grid-row: span 2; }
  .gallery-item img {
    width: 100%; height: 100%;
    object-fit: cover;
    transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
    filter: brightness(0.85) saturate(1.1);
  }
  .gallery-item:hover img { transform: scale(1.08); filter: brightness(0.95) saturate(1.2); }
  .gallery-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(26,18,8,0.7) 0%, transparent 60%);
    opacity: 0; transition: opacity 0.3s;
    display: flex; align-items: flex-end; padding: 16px;
  }
  .gallery-item:hover .gallery-overlay { opacity: 1; }
  .gallery-label { color: #fff; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; }

  .lightbox {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.92); z-index: 9999;
    align-items: center; justify-content: center;
  }
  .lightbox.open { display: flex; }
  .lightbox img { max-width: 90vw; max-height: 85vh; object-fit: contain; border: 2px solid var(--gold); }
  .lightbox-close {
    position: absolute; top: 24px; right: 32px;
    color: #fff; font-size: 32px; cursor: pointer;
    opacity: 0.7; transition: opacity 0.2s;
    background: none; border: none; font-family: sans-serif;
  }
  .lightbox-close:hover { opacity: 1; }

  footer { background: var(--dark); padding: 60px 32px 32px; text-align: center; }
  .footer-logo { font-family: 'Playfair Display', serif; font-size: 2.5rem; font-weight: 900; color: #fff; }
  .footer-logo em { font-style: italic; color: var(--gold); }
  .footer-tagline { color: rgba(255,255,255,0.4); font-size: 10px; letter-spacing: 4px; text-transform: uppercase; margin-top: 8px; }
  .footer-divider { width: 100%; height: 1px; background: rgba(201,168,76,0.15); margin: 32px 0; }
  .footer-copy { color: rgba(255,255,255,0.3); font-size: 11px; letter-spacing: 1px; }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce {
    0%, 100% { transform: translateX(-50%) translateY(0); }
    50% { transform: translateX(-50%) translateY(-8px); }
  }
  .reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.6s ease, transform 0.6s ease; }
  .reveal.visible { opacity: 1; transform: translateY(0); }

  @media (max-width: 768px) {
    .gallery-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .gallery-item:first-child { grid-column: span 2; grid-row: span 1; height: 220px; }
    .gallery-item { height: 150px; }
    .nav-inner { justify-content: flex-start; }
    .menu-grid { grid-template-columns: 1fr 1fr; }
    .section-wrap { padding: 60px 16px; }
  }
  @media (max-width: 480px) {
    .menu-grid { grid-template-columns: 1fr; }
    .gallery-grid { grid-template-columns: 1fr; }
    .gallery-item:first-child { grid-column: span 1; }
    .gallery-item { height: 200px; }
  }
</style>
</head>

      <div class="gallery-item" onclick="openLightbox(this)">

</section>

<footer>
  <div class="footer-logo">Mamma <em>Mia</em></div>
  <p class="footer-tagline" data-i18n="footer_tagline">Savoare autentică, livrată cu drag</p>
  <div class="footer-divider"></div>
  <p class="footer-copy" data-i18n="footer_copy">© 2026 Mamma Mia Restaurant. Toate drepturile rezervate.</p>
</footer>

<div class="lightbox" id="lightbox">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <img id="lightbox-img" src="" alt="">
</div>

let currentLang = 'ro';

function buildNav(lang) {
  const nav = document.getElementById('nav-inner');
  nav.innerHTML = '';
  Object.keys(menuData).forEach(key => {
    const a = document.createElement('a');
    a.href = '#section-' + key;
    a.className = 'nav-item';
    a.textContent = sectionTitles[lang][key];
    nav.appendChild(a);
  });
}

function buildMenu(lang) {
  const container = document.getElementById('menu');
  container.innerHTML = '';
  Object.entries(menuData).forEach(([key, data]) => {
    const section = document.createElement('div');
    section.className = 'menu-section reveal';
    section.id = 'section-' + key;
    const items = data.items[lang] || data.items.ro;
    const cardsHTML = items.map((name, i) => `
      <div class="food-card">
        <span class="card-num">${String(i+1).padStart(2,'0')}</span>
        <div class="card-name">${name}</div>
        <span class="card-tag">${data.icon} ${sectionTitles[lang][key]}</span>
      </div>
    `).join('');
    section.innerHTML = `
      <div class="section-wrap">
        <div class="section-header">
          <span class="section-eyebrow">${data.icon}</span>
          <h2 class="section-title">${sectionTitles[lang][key]}</h2>
          <div class="section-divider"></div>
        </div>
        <div class="menu-grid">${cardsHTML}</div>
      </div>
    `;
    container.appendChild(section);
  });
  initReveal();
}

function applyI18n(lang) {
  document.querySelectorAll('[data-i18n]').forEach(el => {
    const key = el.getAttribute('data-i18n');
    if (i18n[lang][key]) el.textContent = i18n[lang][key];
  });
}

function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.lang-btn[onclick="setLang('${lang}')"]`).classList.add('active');
  buildNav(lang);
  buildMenu(lang);
  applyI18n(lang);
}

function openLightbox(el) {
  const img = el.querySelector('img');
  document.getElementById('lightbox-img').src = img.src;
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
document.getElementById('lightbox').addEventListener('click', function(e) {
  if (e.target === this) closeLightbox();
});

function initReveal() {
  const obs = new IntersectionObserver((entries) => {
    entries.forEach(e => {
      if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }
    });
  }, { threshold: 0.07 });
  document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
}

setLang('ro');
